spring.application.name=roomservice

# activer Redis pour le cache
spring.cache.type=redis
# configuration du serveur Redis
spring.redis.host=localhost
spring.redis.port=6379
# TTL par defaut : 2 minutes
spring.cache.redis.time-to-live=120000

#configuration BD
spring.datasource.url=jdbc:mysql://localhost:3306/ms_room_db
spring.datasource.username=root
spring.datasource.password=passer123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# affiche les requetes SQL dans la console
spring.jpa.show-sql=true

# formate les requetes SQL pour les rendre lisibles
spring.jpa.properties.hibernate.format_sql=true

#Spring Boot Actuator expose des endpoints de monitoring sur ton API
############################################
# CONFIGURATION DES LOGS
############################################
# niveau de log pour Spring Web
# DEBUG = tres detaille
# INFO = normal
# ERROR = seulement erreurs
logging.level.org.springframework.web=DEBUG

# fichier dans lequel les logs seront enregistres
logging.file.name=logs/logs.log


############################################
# CONFIGURATION SPRING ACTUATOR (MONITORING)
############################################

# expose les endpoints actuator via HTTP
management.endpoints.web.exposure.include=health,info,metrics

# afficher les details de letat de sante de lapplication
management.endpoint.health.show-details=always



info.application.name=roomservice-ms
info.application.version=1.0


############################################
# CONFIGURATION REDIS (si tu utilises cache Redis)
############################################

# activer la verification de letat de Redis
management.health.redis.enabled=true


############################################
# PORT DU SERVEUR SPRING BOOT
############################################

# port sur lequel ton application va demarrer
server.port=8081
